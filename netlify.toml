# Yellow Book — Netlify (same as localhost:5175 → /api → live backend)
# Base directory: EMPTY (repo root). Publish: frontend/dist (from build).

[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Live API: set DATABASE_URL in Netlify (Neon) — same DB as localhost. No Render/card needed.
# Optional: BACKEND_URL only if you deploy .NET API elsewhere.
[context.production.environment]
  JWT_KEY = "YellowBook-Super-Secret-Key-Change-In-Production-2026!"
  AdminUser__Username = "admin"
  AdminUser__Password = "Admin@123"

[context.deploy-preview.environment]
  JWT_KEY = "YellowBook-Super-Secret-Key-Change-In-Production-2026!"
  AdminUser__Username = "admin"
  AdminUser__Password = "Admin@123"

[functions]
  [functions.api]
    timeout = 26

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200

# All API traffic → serverless proxy (BACKEND_URL) or demo fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
