# Yellow Book — FREE static hosting (no serverless functions = no usage quota)
# Site: https://yellowbooksystem.netlify.app

[build]
  command = "npm run netlify-build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200

# All GET /api → static JSON (zero function invocations)
[[redirects]]
  from = "/api/health"
  to = "/_data/health.json"
  status = 200
[[redirects]]
  from = "/api/categories"
  to = "/_data/categories.json"
  status = 200
[[redirects]]
  from = "/api/businesses/featured"
  to = "/_data/featured.json"
  status = 200
[[redirects]]
  from = "/api/businesses/search"
  to = "/_data/search.json"
  status = 200
[[redirects]]
  from = "/api/businesses/pending"
  to = "/_data/pending.json"
  status = 200
[[redirects]]
  from = "/api/businesses/:id"
  to = "/_data/business-:id.json"
  status = 200
[[redirects]]
  from = "/api/businesses"
  to = "/_data/businesses.json"
  status = 200
[[redirects]]
  from = "/api/dashboard/stats"
  to = "/_data/stats.json"
  status = 200
[[redirects]]
  from = "/api/dashboard"
  to = "/_data/stats.json"
  status = 200
[[redirects]]
  from = "/api/payments"
  to = "/_data/payments.json"
  status = 200
[[redirects]]
  from = "/api/reviews"
  to = "/_data/reviews.json"
  status = 200
[[redirects]]
  from = "/api/analytics/summary"
  to = "/_data/analytics-summary.json"
  status = 200
[[redirects]]
  from = "/api/upload/status"
  to = "/_data/upload-status.json"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
