# Yellow Book — Netlify (same as localhost:5175 → /api → live backend)
# Base directory: EMPTY (repo root). Publish: frontend/dist (from build).

[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api to Render (.NET + Neon) — same data as localhost Vite proxy
[context.production.environment]
  BACKEND_URL = "https://yellowbook-api.onrender.com"

[context.deploy-preview.environment]
  BACKEND_URL = "https://yellowbook-api.onrender.com"

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200

# All API traffic → serverless proxy (BACKEND_URL) or demo fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
