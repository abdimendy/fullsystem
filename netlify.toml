# Yellow Book — Netlify (same layout as localhost:5175)
# Connect repo root; do NOT set base directory to frontend/ only.

[build]
  command = "npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Static API JSON (fast, no cold start)
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/_data/health.json"
  status = 200

[[redirects]]
  from = "/api/categories"
  to = "/_data/categories.json"
  status = 200

[[redirects]]
  from = "/api/businesses/featured"
  to = "/_data/featured.json"
  status = 200

[[redirects]]
  from = "/api/businesses/search"
  to = "/_data/search.json"
  status = 200

[[redirects]]
  from = "/api/dashboard/stats"
  to = "/_data/stats.json"
  status = 200

[[redirects]]
  from = "/api/businesses"
  to = "/_data/businesses.json"
  status = 200

# Dynamic /api (demo + optional BACKEND_URL proxy to Render)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# React Router SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
