# Yellow Book API — deploy: https://render.com/deploy?repo=https://github.com/abdimendy/fullsystem
# After deploy: set DATABASE_URL (Neon) + AdminUser__Password in Render dashboard.

services:
  - type: web
    name: yellowbook-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/YellowBook.API/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        sync: false
      - key: ENABLE_SWAGGER
        value: "true"
      - key: FRONTEND_URL
        value: https://fullsystem-7med.vercel.app
      - key: Cors__AllowedOrigins
        value: https://fullsystem-7med.vercel.app,https://yellowbooksystem.netlify.app
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: YellowBookAPI
      - key: Jwt__Audience
        value: YellowBookClient
      - key: AdminUser__Username
        value: admin
      - key: AdminUser__Password
        sync: false
      - key: CLOUDINARY_URL
        sync: false
